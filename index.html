<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a6b3a;
    --green-light: #e8f3ec;
    --bg: #f7f8f6;
    --surface: #ffffff;
    --surface2: #f0f4f1;
    --border: #dde3de;
    --text: #1a1f1b;
    --muted: #6b7d6e;
    --radius: 8px;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.6; min-height: 100vh; }

  .site-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 1rem; text-align: center; position: sticky; top: 0; z-index: 100; }
  .site-header h1 { font-size: clamp(1.3rem, 4vw, 1.8rem); font-weight: 600; color: var(--text); line-height: 1; }
  .site-header p { color: var(--muted); font-size: 0.82rem; margin-top: 3px; }

  .nav { display: flex; justify-content: center; gap: 4px; padding: 0.75rem 1rem; flex-wrap: wrap; background: var(--surface); border-bottom: 1px solid var(--border); }
  .nav button { font-family: var(--font-body); font-size: 0.85rem; font-weight: 500; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 5px 16px; cursor: pointer; transition: all 0.2s; }
  .nav button:hover { color: var(--text); border-color: #aaa; }
  .nav button.active { background: var(--green); color: #fff; border-color: var(--green); font-weight: 600; }

  .page { display: none; padding: 1rem; max-width: 1000px; margin: 0 auto; padding-bottom: 4rem; }
  .page.active { display: block; }

  /* Participants */
  .participants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; }
  .participant-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px; display: flex; align-items: center; gap: 12px; }
  .flag { flex-shrink: 0; width: 32px; display: flex; align-items: center; justify-content: center; }
  .flag-svg { width: 28px; height: auto; display: block; border-radius: 2px; border: 1px solid #f4f4f8}
  .participant-card .country { font-weight: 600; font-size: 0.88rem; }
  .participant-card .person { font-size: 0.78rem; color: var(--green); }
  .participant-card .grp { font-size: 0.72rem; color: var(--muted); }

  /* Group header */
  .group-header { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--green); margin: 1.2rem 0 0.5rem; padding: 5px 10px; background: var(--green-light); border-radius: 5px; }

  /* Fixtures — simplified */
  .fixture { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 6px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 6px; }
  .team-home { display: flex; align-items: center; gap: 8px; }
  .team-away { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .team-name { font-weight: 500; font-size: 0.88rem; }
  .team-person { font-size: 0.72rem; color: var(--green); }
  .mid { display: flex; flex-direction: column; align-items: center; gap: 1px; min-width: 90px; }
  .score { font-size: 1.1rem; font-weight: 600; color: var(--text); letter-spacing: 1px; }
  .vs { color: var(--muted); font-size: 0.8rem; }
  .fixture-meta { font-size: 0.68rem; color: var(--muted); text-align: center; line-height: 1.4; }
  .match-note { font-size: 0.65rem; color: var(--green); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 1px; }

  /* Standings */
  .standings-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
  .standings-table th { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); padding: 7px 10px; text-align: center; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .standings-table th:first-child { text-align: left; }
  .standings-table td { padding: 8px 10px; text-align: center; border-bottom: 1px solid var(--border); }
  .standings-table tbody tr:last-child td { border-bottom: none; }
  .standings-table td:first-child { text-align: left; }
  .standings-table tr:hover td { background: var(--surface2); }
  .standings-table .pos { color: var(--muted); font-size: 0.8rem; }
  .standings-table .pts { font-weight: 600; color: var(--green); }
  .standings-table .team-cell { display: flex; align-items: center; gap: 8px; }
  .standings-table .q-direct { background: #f0f9f4; }
  .standings-table .person-tag { font-size: 0.7rem; color: var(--green); }

  /* Search */
  .search-wrap { margin-bottom: 1rem; }
  .search-wrap input { width: 100%; padding: 10px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; }
  .search-wrap input:focus { outline: none; border-color: var(--green); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* Stage filter */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .filter-btn { font-family: var(--font-body); font-size: 0.78rem; font-weight: 500; background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; cursor: pointer; white-space: nowrap; }
  .filter-btn.active { background: var(--green-light); color: var(--green); border-color: var(--green); font-weight: 600; }

  /* Date filter — scrollable on mobile */
  #dateFilter { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; margin-bottom: 0.75rem; scrollbar-width: none; }
  #dateFilter::-webkit-scrollbar { display: none; }

  /* Knocked out */
  .participant-card.knocked-out { opacity: 0.45; }
  .participant-card.knocked-out .flag-svg { filter: grayscale(1); }
  .participant-card.knocked-out .country { text-decoration: line-through; color: var(--muted); }
  .participant-card.knocked-out .person { color: var(--muted); }
  .ko-badge { font-size: 0.65rem; color: #b94040; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Bracket — true tournament tree, horizontally scrollable */
  .bracket-scroll { overflow-x: auto; padding-bottom: 1rem; -webkit-overflow-scrolling: touch; }
  .bracket-tree { display: flex; gap: 28px; min-width: max-content; padding: 4px 4px 1rem; }
  .bracket-col { display: flex; flex-direction: column; justify-content: space-around; min-width: 220px; }
  .bracket-col-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--green); text-align: center; margin-bottom: 0.6rem; }
  .bracket-slot { display: flex; align-items: center; flex: 1; }
  .bracket-fixture { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; width: 100%; position: relative; margin: 8px 0;}
  .bracket-team { display: flex; align-items: center; gap: 8px; padding: 8px 10px; }
  .bracket-team:first-child { border-bottom: 1px solid var(--border); }
  .bracket-team .b-name { font-weight: 500; font-size: 0.82rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bracket-team .b-score { font-weight: 700; font-size: 0.88rem; color: var(--text); min-width: 18px; text-align: right; }
  .bracket-team .b-person { font-size: 0.66rem; color: var(--green); }
  .bracket-team.winner { background: #f0f9f4; }
  .bracket-team.winner .b-name { font-weight: 700; }
  .bracket-pending .b-name { color: var(--muted); font-style: italic; }
  .bracket-note { font-size: 0.6rem; color: var(--green); text-transform: uppercase; letter-spacing: 0.3px; text-align: center; padding: 2px 0; background: var(--surface2); }
  /* Connector lines between rounds */
  .bracket-col:not(:first-child) .bracket-slot::before {
    content: ''; position: absolute; left: -28px; width: 28px; height: 1px; background: var(--border);
  }
  .bracket-col { position: relative; }
  .bracket-slot { position: relative; }

  @media (max-width: 480px) {
    .team-name { font-size: 0.78rem; }
    .mid { min-width: 70px; }
  }
</style>
</head>

function flag(name) {
  const file = FLAG_FILE[name];
  return file ? `<img class="flag-svg" src="${CDN}${file}.svg" alt="${name}" loading="lazy">` : '';
}

function formatDate(d) {
  if (!d) return "";
  return new Date(d + "T12:00:00").toLocaleDateString("en-IE", { weekday:"short", day:"numeric", month:"short" });
}

function renderParticipants(filter = "") {
  const lf = filter.toLowerCase();
  const items = TEAMS.filter(t =>
    !filter || t.name.toLowerCase().includes(lf) || (FULL_DRAW[t.name] || "").toLowerCase().includes(lf)
  ).sort((a, b) => {
    const aKo = KNOCKED_OUT.includes(a.name) ? 1 : 0;
    const bKo = KNOCKED_OUT.includes(b.name) ? 1 : 0;
    return aKo - bKo;
  });
  document.getElementById("participantsGrid").innerHTML = items.map(t => {
    const ko = KNOCKED_OUT.includes(t.name);
    return `
    <div class="participant-card${ko ? ' knocked-out' : ''}">
      <div class="flag">${flag(t.name)}</div>
      <div>
        <div class="country">${t.name}</div>
        <div class="person">${FULL_DRAW[t.name] || "—"}</div>
        <div class="grp">${ko ? '<span class="ko-badge">Eliminated</span>' : `Group ${t.group}`}</div>
      </div>
    </div>`;
  }).join("");
}

function filterParticipants() { renderParticipants(document.getElementById("participantSearch").value); }

const STAGES = ["All","Group Stage","Round of 32","Round of 16","Quarter-finals","Semi-finals","Final"];
let activeStage = "Round of 16";
let activeDate = "All";

function renderStageFilter() {
  document.getElementById("stageFilter").innerHTML = STAGES.map(s =>
    `<button class="filter-btn${s === activeStage ? " active" : ""}" onclick="setStage('${s}')">${s}</button>`
  ).join("");
}

function renderDateFilter() {
  const dateEl = document.getElementById("dateFilter");
  const relevant = activeStage === "All"
    ? FIXTURES.filter(f => f.date && f.date !== "TBC")
    : FIXTURES.filter(f => f.stage === activeStage && f.date && f.date !== "TBC");
  const dates = [...new Set(relevant.map(f => f.date))].sort();
  if (!dates.length) { dateEl.style.display = "none"; return; }

  dateEl.style.display = "flex";
  dateEl.innerHTML = [
    `<button class="filter-btn${activeDate === "All" ? " active" : ""}" onclick="setDate('All')">All dates</button>`,
    ...dates.map(d => {
      const label = new Date(d + "T12:00:00").toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"short" });
      return `<button class="filter-btn${activeDate === d ? " active" : ""}" onclick="setDate('${d}')">${label}</button>`;
    })
  ].join("");
}

function setStage(s) {
  activeStage = s;
  activeDate = "All";
  renderStageFilter();
  renderDateFilter();
  renderFixtures();
}

function setDate(d) {
  activeDate = d;
  renderDateFilter();
  renderFixtures();
}

function fixtureHTML(f) {
  const hasResult = f.homeScore !== null && f.awayScore !== null;
  const hp = FULL_DRAW[f.home] || "";
  const ap = FULL_DRAW[f.away] || "";
  const hko = KNOCKED_OUT.includes(f.home);
  const ako = KNOCKED_OUT.includes(f.away);
  return `
  <div class="fixture">
    <div class="team-home" style="${hko ? 'opacity:0.4' : ''}">
      <div class="flag">${flag(f.home)}</div>
      <div>
        <div class="team-name">${f.home}</div>
        ${hp ? `<div class="team-person">${hp}</div>` : ""}
      </div>
    </div>
    <div class="mid">
      ${hasResult
        ? `<div class="score">${f.homeScore} – ${f.awayScore}</div>${f.note ? `<div class="match-note">${f.note}</div>` : ''}`
        : `<div class="vs">vs</div>`}
      <div class="fixture-meta">${formatDate(f.date)}, ${f.time}</div>
    </div>
    <div class="team-away" style="${ako ? 'opacity:0.4' : ''}">
      <div style="text-align:right">
        <div class="team-name">${f.away}</div>
        ${ap ? `<div class="team-person">${ap}</div>` : ""}
      </div>
      <div class="flag">${flag(f.away)}</div>
    </div>
  </div>`;
}

function renderFixtures() {
  const list = document.getElementById("fixturesList");
  let filtered = FIXTURES.filter(f => activeStage === "All" || f.stage === activeStage);
  if (activeDate !== "All") filtered = filtered.filter(f => f.date === activeDate);

  if (!filtered.length) {
    list.innerHTML = `<p style="color:var(--muted);font-size:0.9rem;margin-top:0.5rem;">No fixtures found.</p>`;
    return;
  }

  // When a specific date is selected, group by group letter (or stage for knockouts)
  // When showing all of Group Stage, group by group letter as before
  // When showing "All" stages with no date filter, group by date
  if (activeDate !== "All") {
    // Group by group/stage within that day
    const byGroup = {};
    filtered.forEach(f => {
      const key = f.group ? `Group ${f.group}` : f.stage;
      if (!byGroup[key]) byGroup[key] = [];
      byGroup[key].push(f);
    });
    list.innerHTML = Object.keys(byGroup).map(g =>
      `<div class="group-header">${g}</div>${byGroup[g].map(fixtureHTML).join("")}`
    ).join("");
  } else if (activeStage === "Group Stage") {
    const byGroup = {};
    filtered.forEach(f => { const g = f.group || "?"; if (!byGroup[g]) byGroup[g] = []; byGroup[g].push(f); });
    list.innerHTML = Object.keys(byGroup).sort().map(g =>
      `<div class="group-header">Group ${g}</div>${byGroup[g].map(fixtureHTML).join("")}`
    ).join("");
  } else {
    list.innerHTML = filtered.map(fixtureHTML).join("");
  }
}

// ════════════════════════════════════════════════
// RENDER — STANDINGS
// ════════════════════════════════════════════════
function renderStandings() {
  const stats = {};
  TEAMS.forEach(t => { stats[t.name] = { p:0, w:0, d:0, l:0, gf:0, ga:0 }; });

  FIXTURES.filter(f => f.stage === "Group Stage" && f.homeScore !== null).forEach(f => {
    const h = stats[f.home], a = stats[f.away];
    if (!h || !a) return;
    h.p++; a.p++; h.gf += f.homeScore; h.ga += f.awayScore; a.gf += f.awayScore; a.ga += f.homeScore;
    if (f.homeScore > f.awayScore) { h.w++; a.l++; }
    else if (f.homeScore < f.awayScore) { a.w++; h.l++; }
    else { h.d++; a.d++; }
  });

  const groups = [...new Set(TEAMS.map(t => t.group))].sort();
  document.getElementById("standingsList").innerHTML = groups.map(g => {
    const rows = TEAMS.filter(t => t.group === g).map(t => ({
      name: t.name,
      ...stats[t.name],
      pts: stats[t.name].w * 3 + stats[t.name].d,
      gd: stats[t.name].gf - stats[t.name].ga,
    })).sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

    return `
      <div class="group-header">Group ${g}</div>
      <table class="standings-table">
        <thead><tr>
          <th></th><th style="text-align:left">Team</th>
          <th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
        </tr></thead>
        <tbody>${rows.map((t, i) => {
          const ko = KNOCKED_OUT.includes(t.name);
          return `
          <tr class="${i < 2 ? 'q-direct' : ''}" style="${ko ? 'opacity:0.4' : ''}">
            <td class="pos">${i+1}</td>
            <td><div class="team-cell">${flag(t.name)} <span>${t.name}</span> <span class="person-tag">${FULL_DRAW[t.name] || ""}</span></div></td>
            <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
            <td>${t.gf}</td><td>${t.ga}</td>
            <td>${t.gd > 0 ? '+' : ''}${t.gd}</td>
            <td class="pts">${t.pts}</td>
          </tr>`;
        }).join("")}
        </tbody>
      </table>`;
  }).join("");
}

  if (!hasAny) {
    el.innerHTML = `<p style="color:var(--muted);margin-top:1rem;font-size:0.9rem;">The knockout bracket will appear here once the group stage is complete.</p>`;
    return;
  }
 
  // Only render columns up to the furthest round that has matches
  const order = ['r32', 'r16', 'qf', 'sf', 'final'];
  const lastIndex = order.reduce((acc, key, i) => BRACKET[key].length ? i : acc, 0);
  const cols = order.slice(0, lastIndex + 1);
  // 3rd place play-off only appears once we've reached the semi-finals column
  const showThird = lastIndex >= order.indexOf('sf');
 
  el.innerHTML = cols.map(key => {
    const matches = BRACKET[key];
    // Pad future rounds with TBC placeholders sized to match bracket progression
    const expectedCount = Math.max(matches.length, Math.ceil((BRACKET[order[order.indexOf(key) - 1]]?.length || matches.length * 2) / 2));
    const slots = matches.length ? matches : Array.from({ length: expectedCount }, () => ({ home: null, away: null, homeScore: null, awayScore: null }));
 
    // After the Semi-finals column, slot in the 3rd Place Play-off as its own column
    const extraCol = (key === 'sf' && showThird) ? renderBracketColumn('third', BRACKET.third.length ? BRACKET.third : [{ home:null, away:null, homeScore:null, awayScore:null }]) : '';
 
    return renderBracketColumn(key, slots) + extraCol;
  }).join('');
}
 
function renderBracketColumn(key, slots) {
  return `
      <div class="bracket-col">
        <div class="bracket-col-title">${STAGE_LABELS[key]}</div>
        ${slots.map(m => {
          const played = m.homeScore !== null && m.homeScore !== undefined;
          return `
          <div class="bracket-slot">
            <div class="bracket-fixture">
              ${bracketTeamHTML(m.home, m.homeScore, played && m.homeWin === true)}
              ${bracketTeamHTML(m.away, m.awayScore, played && m.homeWin === false)}
              ${m.note ? `<div class="bracket-note">${m.note}</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
}

// ════════════════════════════════════════════════
// NAV
// ════════════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".nav button").forEach(b => {
    if (b.getAttribute("onclick").includes(`'${id}'`)) b.classList.add("active");
  });
}

// Init
renderParticipants();
renderStageFilter();

// Auto-select today's date if there are fixtures on it
const today = new Date().toISOString().slice(0, 10);
const hasToday = FIXTURES.some(f => f.date === today && f.stage === activeStage);
if (hasToday) activeDate = today;

renderDateFilter();
renderFixtures();
renderStandings();
renderBracket();
</script>
